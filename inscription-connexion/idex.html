<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Plier</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:ital,wght@1,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111;
    }

    /* ── NAV ── */
    nav {
      background: #8aab72;
      display: grid;
      grid-template-columns: auto 1.5px 1fr 1.5px auto;
      align-items: stretch;
      padding: 0;
      height: 78px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-style: italic;
      font-weight: 800;
      font-size: 1.5rem;
      color: white;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
      padding: 0 20px;
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    /* vertical dividers */
    .nav-divider {
      background: rgba(255,255,255,0.45);
      margin: 10px 0;
    }

    /* middle block: search pill on top, links below */
    .nav-center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 5px;
      padding: 12px 32px;
    }

    .search-bar {
      width: 100%;
      background: rgba(190,220,170,0.6);
      border: none;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 0.88rem;
      color: #444;
      font-family: 'Inter', sans-serif;
      outline: none;
      font-style: italic;
    }
    .search-bar::placeholder { color: #557a44; font-style: italic; }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
      padding-left: 16px;
    }
    .nav-links a {
      font-style: italic;
      font-weight: 700;
      color: white;
      text-decoration: none;
      font-size: 0.68rem;
    }

    /* avatar cell */
    .nav-avatar-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      overflow: hidden;
      background: #c5d9b5;
      flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── PAGE CONTENT ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 28px 80px;
    }

    .greeting {
      font-family: 'Syne', sans-serif;
      font-style: italic;
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 48px;
    }

    /* ── SECTION ── */
    .section { margin-bottom: 56px; }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-style: italic;
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .section-line {
      border: none;
      border-top: 1.5px solid #ccc;
      margin-bottom: 28px;
    }

    /* ── CAROUSEL ROW ── */
    .row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .items {
      display: flex;
      gap: 22px;
      flex: 1;
      overflow: hidden;
    }

    .arrow {
      font-size: 2.2rem;
      font-weight: 900;
      cursor: pointer;
      color: #111;
      padding: 0 4px;
      user-select: none;
      flex-shrink: 0;
      line-height: 1;
    }

    /* ── CIRCLE CARDS (tendances) ── */
    .circle-card {
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: center;
    }

    .circle-img {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 50%;
      overflow: hidden;
      background: #d9d9d9;
    }
    .circle-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── SQUARE CARDS (achats) ── */
    .square-card {
      flex: 1;
      min-width: 0;
    }

    .square-img {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 14px;
      overflow: hidden;
      background: #d9d9d9;
    }
    .square-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo" href="#">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 7 Q1 3 4 1" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M5 7h4l4 14h14l3-9H12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="28" r="2.5" fill="white"/>
      <circle cx="26" cy="28" r="2.5" fill="white"/>
    </svg>
    Market Plier
  </a>

  <div class="nav-divider"></div>

  <div class="nav-center">
    <input class="search-bar" type="text" placeholder="Rechercher" />
    <ul class="nav-links">
      <li><a href="#">vendre</a></li>
      <li><a href="#">lange</a></li>
      <li><a href="#">aide</a></li>
    </ul>
  </div>

  <div class="nav-divider"></div>

  <div class="nav-avatar-cell">
    <div class="avatar">
      <img src="https://picsum.photos/seed/avatar1/100/100" alt="profil" />
    </div>
  </div>
</nav>

<!-- PAGE -->
<div class="page">

  <h1 class="greeting">Bonjour, Gaspmi</h1>

  <!-- TENDANCES -->
  <div class="section">
    <h2 class="section-title">Articles tendances</h2>
    <hr class="section-line" />
    <div class="row">
      <div class="items">
        <div class="circle-card"><div class="circle-img"><img src="https://picsum.photos/seed/t1/300/300" alt="" /></div></div>
        <div class="circle-card"><div class="circle-img"><img src="https://picsum.photos/seed/t2/300/300" alt="" /></div></div>
        <div class="circle-card"><div class="circle-img"><img src="https://picsum.photos/seed/t3/300/300" alt="" /></div></div>
        <div class="circle-card"><div class="circle-img"><img src="https://picsum.photos/seed/t4/300/300" alt="" /></div></div>
      </div>
      <span class="arrow">›</span>
    </div>
  </div>

  <!-- ACHATS RÉCENTS -->
  <div class="section">
    <h2 class="section-title">Achats consulté dernierement</h2>
    <hr class="section-line" />
    <div class="row">
      <div class="items">
        <div class="square-card"><div class="square-img"><img src="https://picsum.photos/seed/p1/300/300" alt="" /></div></div>
        <div class="square-card"><div class="square-img"><img src="https://picsum.photos/seed/p2/300/300" alt="" /></div></div>
        <div class="square-card"><div class="square-img"><img src="https://picsum.photos/seed/p3/300/300" alt="" /></div></div>
        <div class="square-card"><div class="square-img"><img src="https://picsum.photos/seed/p4/300/300" alt="" /></div></div>
      </div>
      <span class="arrow">›</span>
    </div>
  </div>

</div>

</body>
</html>
